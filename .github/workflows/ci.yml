name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22', '1.23']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -o bin/sw ./cmd/sw

      - name: Vet
        run: go vet ./...

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: sw-linux-go${{ matrix.go-version }}
          path: bin/sw

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Install Playwright browsers
        run: go run github.com/playwright-community/playwright-go/cmd/playwright@v0.5700.1 install --with-deps chromium

      - name: Run Tests
        run: gotestsum --junitfile junit/test-results.xml -- ./... -v -timeout 120s

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: junit/*.xml

  report:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          path: test-results
          merge-multiple: true

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results/**/*.xml
          reporter: java-junit
