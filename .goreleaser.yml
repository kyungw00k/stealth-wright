# GoReleaser configuration
version: 2

builds:
  - id: sw
    binary: sw
    dir: ./cmd/sw
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: sw
    format: tar.gz

release:
  github:
    owner: kyungw00k
    name: stealth-wright

  footer: |
    ## 📦 Downloads

    ### Pre-built Binaries
    - **Linux (amd64)**: `sw_linux_amd64.tar.gz`
    - **Linux (arm64)**: `sw_linux_arm64.tar.gz`
    - **macOS (amd64)**: `sw_darwin_amd64.tar.gz`
    - **macOS (arm64)**: `sw_darwin_arm64.tar.gz`

    ## 📋 Full Changelog

    See the [full changelog](https://github.com/kyungw00k/stealth-wright/compare/{{ .PreviousTag }}...{{ .Tag }}) for all changes.

    ---

    **Note**: This release is compatible with Go 1.22+

changelog:
  use: github
  sort: asc
  format: "{{.SHA}}: {{.Message}}"
  abbrev: 7
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^build:'
      - '^chore:'
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Improvements"
      regexp: '^.*?(refactor|perf|style)(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: "Build & CI"
      regexp: '^.*?(build|ci|chore)(\([[:word:]]+\))??!?:.+$'
      order: 4
