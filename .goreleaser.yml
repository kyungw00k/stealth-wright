version: 2

project_name: sw

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/sw
    binary: sw
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github-native

brews:
  - repository:
      owner: kyungw00k
      name: homebrew-cli
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/kyungw00k/stealth-wright"
    description: "Stealth Wright - Silent browser automation CLI"
    license: "MIT"
    install: |
      bin.install "sw"
    test: |
      assert_match "sw version", shell_output("#{bin}/sw --version")

release:
  github:
    owner: kyungw00k
    name: stealth-wright
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
